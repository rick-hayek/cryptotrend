<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient: Warm deep charcoal black -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#19130b" />
      <stop offset="50%" stop-color="#110d07" />
      <stop offset="100%" stop-color="#080603" />
    </linearGradient>

    <!-- Border Gradient: Subtle warm bronze highlight -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.25" />
      <stop offset="30%" stop-color="#f7931a" stop-opacity="0.05" />
      <stop offset="70%" stop-color="#000000" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0.15" />
    </linearGradient>

    <!-- Glow Filter for the orange line and dot -->
    <filter id="orangeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- App Icon Drop Shadow -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- App Icon Base Squircle -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="url(#bgGrad)" filter="url(#iconShadow)" />
  <!-- Inner Border Stroke -->
  <rect x="13" y="13" width="486" height="486" rx="115" fill="none" stroke="url(#borderGrad)" stroke-width="3" />

  <!-- Background grid for professional chart detail -->
  <g opacity="0.015" stroke="#ffffff" stroke-width="1">
    <line x1="12" y1="100" x2="500" y2="100" />
    <line x1="12" y1="180" x2="500" y2="180" />
    <line x1="12" y1="260" x2="500" y2="260" />
    <line x1="12" y1="340" x2="500" y2="340" />
    <line x1="12" y1="420" x2="500" y2="420" />
    <line x1="100" y1="12" x2="100" y2="500" />
    <line x1="180" y1="12" x2="180" y2="500" />
    <line x1="260" y1="12" x2="260" y2="500" />
    <line x1="340" y1="12" x2="340" y2="500" />
    <line x1="420" y1="12" x2="420" y2="500" />
  </g>

  <!-- Central Watermark: Large faint Bitcoin Symbol "₿" -->
  <text x="256" y="258" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="280" font-weight="900" fill="#f7931a" opacity="0.12" text-anchor="middle" dominant-baseline="central">₿</text>

  <!-- Glowing Trend Line -->
  <path d="M 98 368 L 150 306 L 182 320 L 315 220 L 400 156" fill="none" stroke="#f7931a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#orangeGlow)" />

  <!-- Trend Line End Node (Dot) -->
  <circle cx="400" cy="156" r="13" fill="#f7931a" filter="url(#orangeGlow)" />
  <circle cx="400" cy="156" r="5" fill="#ffffff" opacity="0.9" />

  <!-- Bottom Text: MARKET -->
  <text x="262" y="440" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" fill="#f7931a" letter-spacing="12" text-anchor="middle" filter="url(#orangeGlow)">MARKET</text>
</svg>
