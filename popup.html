<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Trends</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Crypto Trends</h1>
          <p id="statusText">加载行情中...</p>
        </div>
        <div class="top-actions">
          <button id="refreshButton" class="icon-button" type="button" title="刷新行情" aria-label="刷新行情">
            ↻
          </button>
          <button id="openOptions" class="icon-button" type="button" title="设置" aria-label="设置">
            ⚙
          </button>
        </div>
      </header>

      <section id="marketList" class="market-list" aria-live="polite"></section>

      <section id="emptyState" class="empty-state" hidden>
        <strong>还没有可显示的币种</strong>
        <span>打开设置添加币种或交易对。</span>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
