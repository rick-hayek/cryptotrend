<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CryptoTrends 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <section class="settings">
        <header>
          <h1>Crypto Trends 设置</h1>
          <p id="sourceHelp">配置弹窗里显示的 CoinGecko 币种 ID。每行一个，例如 bitcoin、ethereum。</p>
        </header>

        <label for="dataSource">数据源</label>
        <select id="dataSource">
          <option value="coingecko">CoinGecko</option>
          <option value="binance">Binance</option>
          <option value="okx">OKX</option>
          <option value="coinbase">Coinbase</option>
        </select>

        <label id="itemsLabel" for="marketItems">币种列表</label>
        <textarea id="marketItems" spellcheck="false" rows="12"></textarea>

        <div class="actions">
          <button id="saveButton" type="button">保存</button>
          <button id="resetButton" class="secondary" type="button">恢复默认</button>
        </div>

        <p id="feedback" class="feedback" role="status"></p>
      </section>

      <aside class="examples">
        <h2 id="examplesTitle">默认热门 10 种</h2>
        <ul id="defaultList"></ul>
      </aside>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
